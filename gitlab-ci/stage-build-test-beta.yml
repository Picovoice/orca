.build-test-beta-props:
  cache:
    key: zoo-dev
    paths:
      - ${PV_PEER_MODULE_DIR}/zoo-dev
  rules:
    - if: $CI_COMMIT_REF_NAME == "main-cicd" && $CI_PIPELINE_SOURCE == "api"
    - if: $CI_OPEN_MERGE_REQUESTS && $CI_MERGE_REQUEST_TITLE =~ /^(\[Draft\]|\(Draft\)|Draft:)/
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

.build-test-beta-coverage-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_OPEN_MERGE_REQUESTS && $CI_MERGE_REQUEST_TITLE =~ /^(\[Draft\]|\(Draft\)|Draft:)/
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.beta-perf-rules-main:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

.beta-perf-rules-branch:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_OPEN_MERGE_REQUESTS && $CI_MERGE_REQUEST_TITLE =~ /^(\[Draft\]|\(Draft\)|Draft:)/
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.build-beta:
  script-toolchain:
    - >
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_BETA
      -k BETA
      --platform ${PLATFORM_NAME}
      --builds ${BUILD_TYPE}
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      --toolchain_prefix=${TOOLCHAIN_NAME}-
      --toolchain_path=${CI_PROJECT_DIR}/${TOOLCHAIN_NAME}
      --build
      --test
  script-no-toolchain:
    - >
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_BETA
      -k BETA
      --platform ${PLATFORM_NAME}
      --builds ${BUILD_TYPE}
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      --build
      --test
  script-perf-toolchain:
    - >
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_BETA
      -k BETA
      --platform ${PLATFORM_NAME}
      --builds ${BUILD_TYPE}
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      --toolchain_prefix=${TOOLCHAIN_NAME}-
      --toolchain_path=${CI_PROJECT_DIR}/${TOOLCHAIN_NAME}
      --build
      --perf
      --disable_mocks
  script-perf-no-toolchain:
    - >
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_BETA
      -k BETA
      --platform ${PLATFORM_NAME}
      --builds ${BUILD_TYPE}
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      --build
      --perf
      --disable_mocks

build-beta-linux-eng-release:
  stage: build-beta
  interruptible: true
  coverage: '/lines\:\s+(\d+.\d+)%\s+(?:\(\d+\s+out\s+of\s+\d+\))/'
  image: registry.gitlab.com/picovoice/ypu/ypu:2025-10-08
  variables:
    TOOLCHAIN_VER: 1.0.0
    TOOLCHAIN_NAME: x86_64-unknown-linux-gnu
    PLATFORM_NAME: linux
    BUILD_TYPE: eng_release
  before_script:
    - !reference [.build-toolchain-setup, before-script-toolchain]
    - !reference [.build-toolchain-setup, before-script-setup-token]
  script:
    - !reference [.build-beta, script-toolchain]
    - gcovr --txt -s --gcov-ignore-errors=no_working_dir_found
  tags:
    - pv-cicd-linux-x86-docker
    - pv-cicd-gpu
  cache:
    - !reference [.build-test-beta-props, cache]
  rules:
    - !reference [.build-test-beta-props, rules]

beta-coverage-linux:
  stage: test-beta
  image: python:3.10
  interruptible: true
  needs:
    - build-beta-linux-eng-release
  variables:
    JOB_NAME: build-beta-linux-eng-release
    TARGET_BRANCH: main
  before_script:
    - pip3 install requests
  script:
    - >
      python3 ${PV_PEER_MODULE_DIR}/zoo-dev/script/coverage/check_coverage.py
      --gitlab_api_token ${PV_GROUP_PRIVATE_API_TOKEN}
      --target_branch_name ${TARGET_BRANCH}
      --job_name ${JOB_NAME}
      --project_id ${CI_PROJECT_ID}
      --branch_pipeline_id ${CI_PIPELINE_ID}
  tags:
    - pv-cicd-linux-x86-docker
  rules:
    - !reference [.build-test-beta-coverage-rules, rules]

beta-asan-linux:
  allow_failure: true  # TODO: Remove once memory leaks / crashes are fixed
  stage: test-beta
  interruptible: true
  needs:
    - build-beta-linux-eng-release
  image: registry.gitlab.com/picovoice/ypu/ypu:2025-10-08
  variables:
    TOOLCHAIN_VER: 1.1.0
    TOOLCHAIN_NAME: x86_64-unknown-linux-gnu
    PLATFORM_NAME: linux
    BUILD_TYPE: eng_release
    ASAN_OPTIONS: protect_shadow_gap=0
  before_script:
    - !reference [.build-toolchain-setup, before-script-toolchain]
    - !reference [.build-toolchain-setup, before-script-setup-token]
  script:
    - >
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_BETA
      -k BETA
      --platform ${PLATFORM_NAME}
      --builds ${BUILD_TYPE}
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      --toolchain_prefix=${TOOLCHAIN_NAME}-
      --toolchain_path=${CI_PROJECT_DIR}/${TOOLCHAIN_NAME}
      --build
      --test
      --enable_asan
  tags:
    - pv-cicd-linux-x86-docker
    - pv-cicd-gpu
  cache:
    - !reference [.build-test-beta-props, cache]
  rules:
    - !reference [.build-test-beta-props, rules]

