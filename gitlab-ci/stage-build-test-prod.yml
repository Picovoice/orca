    - pv-cicd-gpu-non-nvidia
  when: manual

build-prod-rpi:
  stage: build-prod
  interruptible: true
  variables:
    TOOLCHAIN_VER: 2.0.0
    TOOLCHAIN_NAME: arm-unknown-linux-gnueabihf
    PLATFORM_NAME: raspberry-pi
    REMOTE_RUNNER_IP: 192.168.1.230
    REMOTE_RUNNER_USER: picovoice
    REMOTE_RUNNER_PWD: $PV_REMOTE_RUNNER_PWD_RPI0
  before_script:
    - export JAVA_HOME="/usr/lib/jvm/java-11-openjdk-armhf"
    - !reference [.build-toolchain-setup, before-script-toolchain]
    - !reference [.build-toolchain-setup, before-script-setup-token]
    - !reference [.build-prod-remote-runner, before_script]
  script:
    - !reference [.build-prod-remote-runner, script-toolchain]
  artifacts:
    paths:
      - build/release/artifacts/
  tags:
    - pv-cicd-rpi4-armv7
