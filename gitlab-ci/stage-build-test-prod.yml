include:
  - local: 'gitlab-ci/utils.yml'

.build-prod:
  script-toolchain:
    - >
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_PROD
      -k PROD
      --platform ${PLATFORM_NAME}
      --builds release
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      --toolchain_prefix=${TOOLCHAIN_NAME}-
      --toolchain_path=${CI_PROJECT_DIR}/${TOOLCHAIN_NAME}
      --build
      --test
    - python3 -m script.artifact_copy --platform ${PLATFORM_NAME}
  script-no-toolchain:
    - >
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_PROD
      -k PROD
      --platform ${PLATFORM_NAME}
      --builds release
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      --build
      --test
    - python3 -m script.artifact_copy --platform ${PLATFORM_NAME}

.build-prod-remote-runner:
  before_script:
    - pip3 install paramiko
  script-toolchain:
    - >
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_PROD
      -k PROD
      --platform ${PLATFORM_NAME}
      --builds release
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      --toolchain_prefix=${TOOLCHAIN_NAME}-
      --toolchain_path=${CI_PROJECT_DIR}/${TOOLCHAIN_NAME}
      --builder_name ${CI_RUNNER_ID}
      --remote_runner_ip ${REMOTE_RUNNER_IP}
      --remote_runner_user ${REMOTE_RUNNER_USER}
      --remote_runner_pwd ${REMOTE_RUNNER_PWD}
      --build
      --test
  script-no-toolchain:
    - >
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_PROD
      -k PROD
      --platform ${PLATFORM_NAME}
      --builds release
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      --builder_name ${CI_RUNNER_ID}
      --remote_runner_ip ${REMOTE_RUNNER_IP}
      --remote_runner_user ${REMOTE_RUNNER_USER}
      --remote_runner_pwd ${REMOTE_RUNNER_PWD}
      --build
      --test

build-prod-linux:
  stage: build-prod
  interruptible: true
  image: registry.gitlab.com/picovoice/zoo-dev/base:2025-02-27
  variables:
    TOOLCHAIN_VER: 1.0.0
    TOOLCHAIN_NAME: x86_64-unknown-linux-gnu
    PLATFORM_NAME: linux
  before_script:
    - !reference [.build-toolchain-setup, before-script-toolchain]
    - !reference [.build-toolchain-setup, before-script-setup-token]
  script:
    - !reference [.build-prod, script-toolchain]
  artifacts:
    paths:
      - build/release/artifacts/
  tags:
    - pv-cicd-linux-x86-docker
    - pv-cicd-gpu
  when: manual

build-prod-mac:
  stage: build-prod
  interruptible: true
  variables:
    PLATFORM_NAME: mac
  before_script:
    - !reference [.build-toolchain-setup, before-script-setup-token]
  script:
    - !reference [.build-prod, script-no-toolchain]
  after_script:
    - rm -rf ~/.pv
  artifacts:
    paths:
      - build/release/artifacts/
  tags:
    - pv-cicd-macos-arm64
    - pv-cicd-c
  when: manual

build-prod-windows-x86:
  stage: build-prod
  interruptible: true
  variables:
    PLATFORM_NAME: windows
  before_script:
    - $ENV:JAVA_HOME = "C:\Java\jdk-11"
    - !reference [.build-toolchain-setup, before-script-setup-token]
  script:
    - !reference [.build-prod, script-no-toolchain]
  after_script:
    - Get-ChildItem ~/.pv -Recurse | Remove-Item
  artifacts:
    paths:
      - build/release/artifacts/
  tags:
    - pv-cicd-windows-x86
    - pv-cicd-c
    - pv-cicd-gpu
  when: manual

build-prod-windows-arm64:
  stage: build-prod
  interruptible: true
  variables:
    PLATFORM_NAME: windows
  before_script:
    - $ENV:JAVA_HOME = "C:\Program Files\Eclipse Adoptium\jdk-21.0.5.11-hotspot"
    - !reference [.build-toolchain-setup, before-script-setup-token]
  script:
    - !reference [.build-prod, script-no-toolchain]
  after_script:
    - Get-ChildItem ~/.pv -Recurse | Remove-Item
  artifacts:
    paths:
      - build/release/artifacts/
  tags:
    - pv-cicd-windows-arm64
