build-prod-ios:
  stage: build-prod
  interruptible: true
  variables:
    PLATFORM_NAME: ios
    BUILD_TYPE: release
  before_script:
    - !reference [.build-toolchain-setup, before-script-setup-token]
    - xcrun simctl uninstall "iPhone 11 Pro" ai.picovoice.PvTestRunner
    - xcrun simctl uninstall "iPhone 11 Pro" ai.picovoice.PvTestRunnerUITests.xctrunner
    - export LC_CTYPE="en_US.UTF-8"
  script:
    - >
      set -o pipefail &&
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_PROD
      --platform ${PLATFORM_NAME}
      --builds ${BUILD_TYPE}
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      -k PROD
      --build
      2>&1 | xcpretty
    - >
      python3 -m script.cicd
      -a $PV_GROUP_VALID_ACCESS_KEY_PROD
      --platform ${PLATFORM_NAME}
      --builds ${BUILD_TYPE}
      --repo_folder ${CI_PROJECT_DIR}
      --build_folder ${CI_PROJECT_DIR}/build
      -k PROD
      --test
    - python3 -m script.artifact_copy --platform ${PLATFORM_NAME}
  artifacts:
    paths:
      - build/release/artifacts/
  tags:
    - pv-cicd-macos-arm64
    - pv-cicd-ios
  when: manual
