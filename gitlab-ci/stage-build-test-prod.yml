build-prod-wasm:
  stage: build-prod
  interruptible: true
  image: registry.gitlab.com/picovoice/zoo-dev/base:2025-02-27
  variables:
    PLATFORM_NAME: wasm
  before_script:
    - export EMSDK_HOME=~/.emsdk
    - !reference [.build-toolchain-setup, before-script-setup-token]
    - cd ${PV_PEER_MODULE_DIR}/zoo-dev/wasm/utils && yarn && yarn build && cd ${CI_PROJECT_DIR}
  script:
    - !reference [.build-prod, script-no-toolchain]
  artifacts:
    paths:
      - build/release/artifacts/
  tags:
    - pv-cicd-linux-x86-docker
    - pv-cicd-gpu
  when: manual

build-prod-android:
  stage: build-prod
  interruptible: true
  variables:
    PLATFORM_NAME: android
  before_script:
    - export PATH="/home/picovoice/Android/Sdk/platform-tools:$PATH"
    - !reference [.build-toolchain-setup, before-script-setup-token]
  script:
    - !reference [.build-prod, script-no-toolchain]
  artifacts:
